services:
  - type: web
    name: dropzone
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: UPLOAD_DIR
        value: /opt/render/project/uploads
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 10

